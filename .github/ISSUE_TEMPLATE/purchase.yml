name: Purchase
description: Track parts, materials, or tools to buy.
title: "[Purchase] "
labels: ["purchase"]
body:
  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Need before next build session
        - Need this month
        - Long-lead risk
        - Nice to have
    validations:
      required: true
  - type: input
    id: estimated_cost
    attributes:
      label: Estimated cost
      placeholder: "$0"
  - type: textarea
    id: reason
    attributes:
      label: Why this is needed
      description: Link it to a build task or milestone.
    validations:
      required: true
  - type: textarea
    id: vendor_options
    attributes:
      label: Vendor options
      description: Add links, lead times, and alternatives.

